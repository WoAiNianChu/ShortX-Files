name: Fetch Latest File from Telegram Group

on:
  # 手动触发工作流
  workflow_dispatch:

  # 定时触发工作流（每小时）
  schedule:
    - cron: '0 * * * *'  # 每小时的第 0 分钟触发

jobs:
  telegram-fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'  # 可以根据需要更改为您使用的 Python 版本

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install telethon

    - name: Run Telegram fetch script and save output to file
      env:
        API_ID: ${{ secrets.TELEGRAM_API_ID }}
        API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        SESSION_NAME: 'chat_name'
        GROUP_ID: '1604486631'
        TOPIC_ID: '752'
      run: |
        OUTPUT_FILE="telegram_output.txt"
        python scripts/fetch_telegram_file.py > $OUTPUT_FILE
        echo "Output saved to $OUTPUT_FILE"

    - name: Commit and push output to repository
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add telegram_output.txt
        git commit -m "Update Telegram fetch output"
        git push
